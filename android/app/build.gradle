plugins {
    id "com.android.application"
    id "kotlin-android"
    // Gunakan plugin Flutter terbaru
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

android {
    // Sesuaikan namespace dengan nama package kamu
    namespace "com.ojgrup.musiksasak" 
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        // Ganti ID aplikasi sesuai keinginanmu (untuk Play Store)
        applicationId "com.ojgrup.musiksasak"
        minSdk 21 
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            // Pakai debug signing agar bisa ditest build --release tanpa buat keystore dulu
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // Kosongkan saja, Flutter sudah mengurus library Kotlin secara otomatis
}
