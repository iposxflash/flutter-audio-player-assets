name: Build Flutter Audio Player (Final Release)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nama Aplikasi'
        required: true
        default: 'Musik Sasak'
      package_name:
        description: 'Package Name'
        required: true
        default: 'com.ojgrup.musiksasak'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' 
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Customize and Upgrade SDK
        run: |
          # 1. Ganti Nama Aplikasi di AndroidManifest
          sed -i 's/android:label=".*"/android:label="${{ github.event.inputs.app_name }}"/g' android/app/src/main/AndroidManifest.xml || true
          
          # 2. Ganti Package Name
          NEW_PKG="${{ github.event.inputs.package_name }}"
          sed -i "s/applicationId \".*\"/applicationId \"$NEW_PKG\"/g" android/app/build.gradle || true
          
          # 3. UPGRADE SDK (Kunci agar tidak diblokir Play Protect)
          # Kita paksa naik ke API 34 (Android 14)
          sed -i "s/compileSdkVersion .*/compileSdkVersion 34/g" android/app/build.gradle || true
          sed -i "s/targetSdkVersion .*/targetSdkVersion 34/g" android/app/build.gradle || true
          sed -i "s/minSdkVersion .*/minSdkVersion 21/g" android/app/build.gradle || true
          
          # 4. Matikan Analisis agar build lebih cepat
          flutter analyze || true

      - name: Build APK Release
        run: flutter build apk --release --split-per-abi --no-pub

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-Release-APK
          path: build/app/outputs/flutter-apk/*.apk
