name: Build Flutter APK & AAB (Final Release)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nama Aplikasi'
        required: true
        default: 'Musik Sasak'
      package_name:
        description: 'Package Name'
        required: true
        default: 'com.ojgrup.musiksasak'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' 
          channel: 'stable'
          cache: true

      - name: Clean and Get Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Customize and Upgrade SDK
        run: |
          # 1. Ganti Nama Aplikasi di AndroidManifest
          sed -i 's/android:label="[^"]*"/android:label="${{ github.event.inputs.app_name }}"/g' android/app/src/main/AndroidManifest.xml || true
          
          # 2. Ganti Package Name (ApplicationId)
          NEW_PKG="${{ github.event.inputs.package_name }}"
          # Menggunakan sed untuk mengganti applicationId di build.gradle
          sed -i "s/applicationId \".*\"/applicationId \"$NEW_PKG\"/g" android/app/build.gradle || true
          
          # 3. UPGRADE SDK (Sesuai standar Google Play 2024/2025)
          sed -i "s/compileSdkVersion .*/compileSdkVersion 34/g" android/app/build.gradle || true
          sed -i "s/targetSdkVersion .*/targetSdkVersion 34/g" android/app/build.gradle || true
          sed -i "s/minSdkVersion .*/minSdkVersion 21/g" android/app/build.gradle || true

      - name: Build Universal APK
        # PERBAIKAN: Menghapus --split-per-abi agar menghasilkan SATU file APK yang kompatibel semua HP
        run: flutter build apk --release

      - name: Build AAB Release
        # Build Android App Bundle untuk Play Store (Otomatis kompatibel semua HP via Play Store)
        run: flutter build appbundle --release

      - name: Rename and Prepare Files
        run: |
          mkdir -p release-files
          cp build/app/outputs/flutter-apk/app-release.apk release-files/${{ github.event.inputs.app_name }}-Universal.apk
          cp build/app/outputs/bundle/release/app-release.aab release-files/${{ github.event.inputs.app_name }}.aab

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-Final-Build
          path: release-files/
